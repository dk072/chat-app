services:
  # Chime Backend Web Service configuration
  - type: web
    name: chime-backend
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install --include=dev && npm run build:render && npm run db:seed
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: chime-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true # Generates a secure random JWT key automatically
      - key: JWT_EXPIRY
        value: 7d
      - key: CLIENT_URL
        value: https://chat-app-ivory-nu-89.vercel.app
      - key: UPLOAD_DIR
        value: ./uploads

  # Chime Admin Panel (Static Site)
  - type: web
    name: chime-admin
    env: static
    plan: free
    rootDir: admin
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://chime-backend.onrender.com/api # IMPORTANT: Replace with actual backend URL

# PostgreSQL Database Service configuration
databases:
  - name: chime-db
    plan: free
    postgresMajorVersion: 15
